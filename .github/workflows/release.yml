name: Release plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versienummer (bijv. 1.0.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Plugin zip aanmaken
        run: |
          mkdir -p /tmp/ftb-donation-form
          rsync -av --exclude-from='.distignore' --exclude='.git' . /tmp/ftb-donation-form/
          cd /tmp
          zip -r ftb-donation-form.zip ftb-donation-form/

      - name: Release aanmaken
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" \
            /tmp/ftb-donation-form.zip \
            --title "v${{ github.event.inputs.version }}" \
            --generate-notes
